<p><a href="/">← Back</a></p>

<h2>{{ photo.name }}</h2>
<p>{{ photo.uploaded_at|date:"Y-m-d H:i" }}</p>

{% if photo.image_url %}
  <img src="{{ photo.image_url }}" style="max-width: 600px;" />
{% elif photo.image %}
  <img src="{{ photo.image.url }}" style="max-width: 600px;" />
{% else %}
  <p><i>No image available</i></p>
{% endif %}
