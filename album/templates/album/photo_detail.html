{% extends "base.html" %}

{% block title %}{{ photo.name }}{% endblock %}

{% block content %}
  <section class="card">
    <div class="page-head">
      <div>
        <h1>{{ photo.name }}</h1>
        <p class="subtle">Feltöltve: {{ photo.uploaded_at|date:"Y-m-d H:i" }}</p>
      </div>
      <a class="btn btn-ghost" href="{% url 'photo_list' %}">Vissza</a>
    </div>

    <img class="detail-image" src="{{ photo.image_url }}" alt="{{ photo.name }}">

    {% if user.is_authenticated %}
      <div class="actions-row">
        <a class="btn btn-ghost" href="{% url 'photo_delete' photo.id %}">Kép törlése</a>
      </div>
    {% endif %}
  </section>
{% endblock %}
