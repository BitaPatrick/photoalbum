<h1>Photo Album</h1>

<p>
  Sort:
  <a href="/?sort=date">Date</a> |
  <a href="/?sort=name">Name</a>
</p>

<p><a href="/upload/">Upload new photo</a></p>

<<ul>
  {% for photo in photos %}
    <li>
      <a href="{% url 'photo_detail' photo.id %}">{{ photo.name }}</a>
      — {{ photo.uploaded_at|date:"Y-m-d H:i" }}
    </li>
  {% empty %}
    <li>No photos yet.</li>
  {% endfor %}
</ul>
