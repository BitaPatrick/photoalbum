{% extends "base.html" %}

{% block title %}Feltöltés{% endblock %}

{% block content %}
  <section class="card form-card">
    <div class="page-head">
      <div>
        <h1>Új kép feltöltése</h1>
        <p class="subtle">A név legfeljebb 40 karakter lehet.</p>
      </div>
      <a class="btn btn-ghost" href="{% url 'photo_list' %}">Vissza</a>
    </div>

    {% if error %}
      <p class="flash">{{ error }}</p>
    {% endif %}

    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="actions-row">
        <button class="btn btn-primary" type="submit">Feltöltés</button>
      </div>
    </form>
  </section>
{% endblock %}
