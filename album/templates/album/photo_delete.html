{% extends "base.html" %}

{% block title %}Törlés{% endblock %}

{% block content %}
  <section class="card form-card">
    <div class="page-head">
      <div>
        <h1>Törlés megerősítése</h1>
        <p class="subtle">Kép: <strong>{{ photo.name }}</strong></p>
      </div>
      <a class="btn btn-ghost" href="{% url 'photo_detail' photo.id %}">Mégse</a>
    </div>

    <p class="danger-note">Ez a művelet a storage objektumot és az adatbázis rekordot is törli.</p>

    <form method="post">
      {% csrf_token %}
      <div class="actions-row">
        <button class="btn btn-danger" type="submit">Igen, törlöm</button>
        <a class="btn btn-ghost" href="{% url 'photo_detail' photo.id %}">Vissza</a>
      </div>
    </form>
  </section>
{% endblock %}
