<h1>Login</h1>

{% if form.errors %}
  <p style="color:red;">Invalid username or password.</p>
{% endif %}

<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Login</button>
</form>

<p>No account yet? <a href="{% url 'register' %}">Register</a></p>
<p><a href="{% url 'photo_list' %}">Back to album</a></p>
