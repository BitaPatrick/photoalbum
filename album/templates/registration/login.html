{% extends "base.html" %}

{% block title %}Belépés{% endblock %}

{% block content %}
  <section class="card form-card">
    <div class="page-head">
      <div>
        <h1>Belépés</h1>
        <p class="subtle">Csak bejelentkezve lehet feltölteni és törölni.</p>
      </div>
      <a class="btn btn-ghost" href="{% url 'photo_list' %}">Vissza</a>
    </div>

    {% if form.errors %}
      <p class="flash">Hibás felhasználónév vagy jelszó.</p>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="actions-row">
        <button class="btn btn-primary" type="submit">Belépés</button>
        <a class="btn btn-secondary" href="{% url 'register' %}">Regisztráció</a>
      </div>
    </form>
  </section>
{% endblock %}
