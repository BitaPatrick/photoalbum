{% extends "base.html" %}

{% block title %}Regisztráció{% endblock %}

{% block content %}
  <section class="card form-card">
    <div class="page-head">
      <div>
        <h1>Regisztráció</h1>
        <p class="subtle">Készíts fiókot a feltöltéshez és törléshez.</p>
      </div>
      <a class="btn btn-ghost" href="{% url 'photo_list' %}">Vissza</a>
    </div>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="actions-row">
        <button class="btn btn-primary" type="submit">Fiók létrehozása</button>
        <a class="btn btn-secondary" href="{% url 'login' %}">Belépés</a>
      </div>
    </form>
  </section>
{% endblock %}
