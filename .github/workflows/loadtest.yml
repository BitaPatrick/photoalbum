name: Cloud Load Test

on:
  workflow_dispatch:

jobs:
  locust:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r loadtest/requirements.txt

      - name: Run Locust
        env:
          LOADTEST_HOST: ${{ secrets.LOADTEST_HOST }}
          LOADTEST_USERNAME: ${{ secrets.LOADTEST_USERNAME }}
          LOADTEST_PASSWORD: ${{ secrets.LOADTEST_PASSWORD }}
        run: |
          if [ -z "$LOADTEST_HOST" ]; then
            echo "Missing LOADTEST_HOST secret"
            exit 1
          fi

          locust -f loadtest/locustfile.py \
            --host "$LOADTEST_HOST" \
            --headless \
            -u 100 \
            -r 10 \
            -t 10m \
            --csv loadtest_report \
            --html loadtest_report.html

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: loadtest-results
          path: |
            loadtest_report.html
            loadtest_report_stats.csv
            loadtest_report_failures.csv
            loadtest_report_exceptions.csv
